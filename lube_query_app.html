<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lube Oil Query System</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f4f8; color: #222; }

  header {
    background: linear-gradient(135deg, #1B3A5C 0%, #2a5a8c 100%);
    padding: 20px 32px;
    display: flex; align-items: center; gap: 16px;
  }
  header h1 { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: .5px; }
  header span { color: #CB9A2A; font-size: 13px; margin-top: 2px; display: block; }

  .container { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }

  .search-card {
    background: #fff; border-radius: 10px;
    box-shadow: 0 2px 10px rgba(0,0,0,.08);
    padding: 24px 28px; margin-bottom: 20px;
  }
  .search-card h2 { font-size: 14px; color: #1B3A5C; font-weight: 700;
    text-transform: uppercase; letter-spacing: .8px; margin-bottom: 16px; }
  .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width:700px) { .fields { grid-template-columns: 1fr; } }

  .field label { display: block; font-size: 12px; font-weight: 600;
    color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
  .field input, .field select {
    width: 100%; padding: 10px 14px; border: 1.5px solid #d0d9e4;
    border-radius: 6px; font-size: 14px; color: #222;
    transition: border-color .2s;
  }
  .field input:focus, .field select:focus {
    outline: none; border-color: #1B3A5C;
  }

  .btn-row { margin-top: 18px; display: flex; gap: 10px; align-items: center; }
  button {
    padding: 9px 22px; border: none; border-radius: 6px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s;
  }
  .btn-search { background: #1B3A5C; color: #fff; }
  .btn-search:hover { background: #14304f; }
  .btn-clear { background: #e8eef5; color: #1B3A5C; }
  .btn-clear:hover { background: #d0dcea; }
  .btn-export { background: #CB9A2A; color: #fff; margin-left: auto; }
  .btn-export:hover { background: #b08520; }

  .results-card {
    background: #fff; border-radius: 10px;
    box-shadow: 0 2px 10px rgba(0,0,0,.08);
    overflow: hidden;
  }
  .results-header {
    padding: 14px 20px; background: #f7f9fc;
    border-bottom: 1px solid #e4eaf2;
    display: flex; align-items: center; justify-content: space-between;
  }
  .results-header span { font-size: 13px; color: #555; }
  .results-header strong { color: #1B3A5C; }

  .table-wrap { overflow-x: auto; max-height: 65vh; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    background: #1B3A5C; color: #fff; font-weight: 600;
    padding: 10px 14px; text-align: left; white-space: nowrap;
    position: sticky; top: 0; z-index: 2;
  }
  tbody tr:nth-child(even) { background: #EBF3FB; }
  tbody tr:hover { background: #dceefa; }
  tbody td { padding: 8px 14px; border-bottom: 1px solid #e8eef5; vertical-align: middle; }
  .tag {
    display: inline-block; padding: 2px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 700;
  }
  .tag-nb { background: #FFF0CC; color: #7B5E00; }
  .tag-lc { background: #E8F5E9; color: #1A6B2F; }
    .tag-oem { background: #E3F2FD; color: #1565C0; }
  .no-result {
    text-align: center; padding: 60px 20px; color: #999; font-size: 14px;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🔍 Lube Oil Query System</h1>
    <span>Marine Lubrication Oil Recommendation Database</span>
  </div>
</header>

<div class="container">
  <div class="search-card">
    <h2>Search</h2>
    <div class="fields">
      <div class="field">
        <label>Maker</label>
        <input type="text" id="makerInput" placeholder="Enter maker name, e.g. WARTSILA, MAN..." list="makerList" autocomplete="off">
        <datalist id="makerList"></datalist>
      </div>
      <div class="field">
        <label>Model / Type</label>
        <input type="text" id="modelInput" placeholder="Enter model / type, e.g. 6S50ME-C8.5...">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-search" onclick="doSearch()">Search</button>
      <button class="btn-clear" onclick="doClear()">Clear</button>
      <span style="font-size:12px;color:#888;margin-left:12px;align-self:center;">Count data base on Maker+Model / Type+Part to be lubricated+Lubricant</span>
      <button class="btn-export" onclick="doExport()">Export CSV</button>
    </div>
  </div>

  <div class="results-card">
    <div class="results-header">
      <span>Results: <strong id="countLabel">35,816 records</strong></span>
      <span id="hintLabel" style="font-size:12px;color:#aaa;">Enter criteria and click Search</span>
    </div>
    <div class="table-wrap">
      <table id="resultTable">
        <thead>
          <tr>
            <th>Equipment</th>
            <th>Maker</th>
            <th>Model / Type</th>
            <th>Part to be lubricated</th>
            <th>Lubricant</th>
            <th>Count</th>
            <th>Source</th>
          </tr>
        </thead>
        <tbody id="resultBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="output/app_data.js"></script>
<script>

// 填入 datalist
const dl = document.getElementById('makerList');
MAKERS.forEach(m => {
  const opt = document.createElement('option');
  opt.value = m; dl.appendChild(opt);
});

let currentRows = DATA;

// 排序優先順序：Source（OEM > LUBE CHART > NB）→ Count 降序 → Maker → Model/Type
const SOURCE_ORDER = { 'OEM': 0, 'LUBE CHART': 1, 'NB': 2 };
function sortByCount(rows) {
  return [...rows].sort((a, b) => {
    const sa = SOURCE_ORDER[a['Source']] ?? 99;
    const sb = SOURCE_ORDER[b['Source']] ?? 99;
    if (sa !== sb) return sa - sb;
    const ca = (a['Count'] != null ? Number(a['Count']) : 1) || 1;
    const cb = (b['Count'] != null ? Number(b['Count']) : 1) || 1;
    if (cb !== ca) return cb - ca;
    const ma = (a['Maker'] || '').toString();
    const mb = (b['Maker'] || '').toString();
    if (ma !== mb) return ma.localeCompare(mb);
    const ta = (a['Model / Type'] || '').toString();
    const tb = (b['Model / Type'] || '').toString();
    return ta.localeCompare(tb);
  });
}

function normalize(s) {
  return (s || '').toString().toUpperCase().trim();
}

function doSearch() {
  const maker = normalize(document.getElementById('makerInput').value);
  const model = normalize(document.getElementById('modelInput').value);

  const filtered = DATA.filter(r => {
    if (maker && !normalize(r['Maker']).includes(maker)) return false;
    if (model && !normalize(r['Model / Type']).includes(model)) return false;
    return true;
  });

  currentRows = sortByCount(filtered);
  renderTable(currentRows);
}

function doClear() {
  document.getElementById('makerInput').value = '';
  document.getElementById('modelInput').value = '';
  currentRows = sortByCount(DATA);
  renderTable(currentRows);
}

function renderTable(rows) {
  const tbody = document.getElementById('resultBody');
  const countLabel = document.getElementById('countLabel');
  const hintLabel = document.getElementById('hintLabel');

  countLabel.textContent = `${rows.length.toLocaleString()} records`;
  hintLabel.textContent = rows.length === DATA.length ? 'Showing all records' : `Filtered from ${DATA.length.toLocaleString()} records`;

  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="no-result">No matching records found.</td></tr>';
    return;
  }

  // Render only first 500 rows to avoid browser lag
  const display = rows.slice(0, 500);
  tbody.innerHTML = display.map(r => {
    const src = r['Source'] === 'NB'
      ? '<span class="tag tag-nb">NB</span>'
      : r['Source'] === 'OEM'
      ? '<span class="tag tag-oem">OEM</span>'
      : '<span class="tag tag-lc">LUBE CHART</span>';
    return `<tr>
      <td>${r['Equipment']}</td>
      <td>${r['Maker']}</td>
      <td>${r['Model / Type']}</td>
      <td>${r['Part to be lubricated']}</td>
      <td><strong>${r['Lubricant']}</strong></td>
      <td style="text-align:center;">${r['Count'] != null ? r['Count'] : 1}</td>
      <td>${src}</td>
    </tr>`;
  }).join('');

  if (rows.length > 500) {
    tbody.innerHTML += `<tr><td colspan="7" style="text-align:center;padding:12px;color:#888;font-size:12px;">
      ⚠️ Showing first 500 of ${rows.length.toLocaleString()} matching records. Narrow your search or export CSV to view all.
    </td></tr>`;
  }
}

function doExport() {
  if (currentRows.length === 0) { alert('No data to export.'); return; }
  const cols = ['Equipment','Maker','Model / Type','Part to be lubricated','Lubricant','Count','Source'];
  const lines = [cols.join(',')];
  currentRows.forEach(r => {
    lines.push(cols.map(c => `"${String(r[c] != null ? r[c] : '').replace(/"/g,'""')}"`).join(','));
  });
  const blob = new Blob(['﻿' + lines.join('\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'lube_oil_query.csv';
  a.click();
}

// Press Enter to trigger search
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// Initial render — sorted by Source (OEM > LUBE CHART > NB) → Count desc → Maker → Model/Type
currentRows = sortByCount(DATA);
renderTable(currentRows);
</script>
</body>
</html>
